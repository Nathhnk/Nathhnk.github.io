        <div class="content contact">
            <h2>Me Contacter Rapidement</h2>
            <div class="contact-form-container">
                
                <form action="#" method="POST">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="nom" name="nom" placeholder=" " required>
                            <label for="nom">Nom Complet</label>
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" name="email" placeholder=" " required>
                            <label for="email">Adresse Email</label>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="sujet" name="sujet" placeholder=" " required>
                            <label for="sujet">Sujet du Message</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <textarea id="message" name="message" rows="5" placeholder=" " required style="margin-top:20px"></textarea>
                        <label for="message">Votre Message</label>
                    </div>

                    <button type="submit" class="submit-button">Envoyer le Message</button>
                </form>

            </div>
        </div>

    </section>
