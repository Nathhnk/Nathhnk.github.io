<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORNECKER Nathan | Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        #canvas-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111827 0%, #030712 100%);
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(74, 207, 238, 0.2);
            border-radius: 25px;
            padding: 40px;
        }

        .form-control-cyber {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 12px 20px;
        }

        .form-control-cyber:focus {
            border-color: #4acfee;
            box-shadow: 0 0 15px rgba(74, 207, 238, 0.2);
            color: white;
        }
    </style>
</head>

<body>

<canvas id="canvas-bg"></canvas>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand text-white" href="index.html">N.HORNECKER</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto gap-3">
                <li class="nav-item"><a class="nav-link text-white" href="index.html">Accueil</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="projets.html">Projets</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="veilles.html">Veilles</a></li>
                <li class="nav-item">
                    <a href="contact.html" class="btn btn-info rounded-pill px-4">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5 mt-5">

    <div class="text-center mb-5">
        <h2 class="text-white">Contact</h2>
        <p class="text-secondary">Envoyez-moi un message</p>
    </div>

    <div class="row justify-content-center">

        <div class="col-lg-6">
            <div class="contact-card">

                <!-- FORMULAIRE FORMSpree -->
                <form action="https://formspree.io/f/mreyjrbl" method="POST">

                    <input type="hidden" name="_subject" value="Nouveau message depuis ton portfolio">
                    <input type="hidden" name="_captcha" value="false">

                    <div class="mb-3">
                        <input type="text" name="nom" class="form-control-cyber w-100" placeholder="Nom complet" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" name="email" class="form-control-cyber w-100" placeholder="Email" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="sujet" class="form-control-cyber w-100" placeholder="Sujet" required>
                    </div>

                    <div class="mb-3">
                        <textarea name="message" class="form-control-cyber w-100" rows="5" placeholder="Message..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-info w-100 rounded-pill py-3">
                        Envoyer
                    </button>

                </form>

            </div>
        </div>

    </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const canvas = document.querySelector('#canvas-bg');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

camera.position.z = 5;

const geometry = new THREE.BufferGeometry();
const count = 2000;
const positions = new Float32Array(count * 3);

for(let i=0;i<count*3;i++){
    positions[i] = (Math.random()-0.5)*10;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({ size:0.02, color:0x4acfee });
const points = new THREE.Points(geometry, material);

scene.add(points);

function animate(){
    requestAnimationFrame(animate);
    points.rotation.y += 0.001;
    renderer.render(scene,camera);
}

renderer.setSize(window.innerWidth, window.innerHeight);
animate();
</script>

</body>
</html>
